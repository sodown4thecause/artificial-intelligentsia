version: 2.1

# This pipeline deliberately never echoes environment variables or secret values.
# Store credentials in CircleCI contexts/project environment variables only.

executors:
  node:
    docker:
      - image: cimg/node:22.14
    working_directory: ~/project
  linux:
    docker:
      - image: cimg/node:22.14
    working_directory: ~/project
  macos:
    macos:
      xcode: "15.4.0"
    resource_class: m4pro.medium
    working_directory: ~/project
  windows:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    working_directory: ~/project

commands:
  attach_dependencies:
    steps:
      - attach_workspace:
          at: ~/project

jobs:
  install:
    executor: node
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci --ignore-scripts
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - persist_to_workspace:
          root: ~/project
          paths:
            - node_modules
            - package.json
            - package-lock.json
            - tsconfig.json
            - src
            - test
            - scripts
            - docs
            - spec
            - apps

  typecheck:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Typecheck
          command: npm run typecheck

  lint:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Lint placeholder
          command: npm run lint

  unit:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Unit tests
          command: |
            mkdir -p test-results
            npm run test:unit -- --test-reporter=junit --test-reporter-destination=test-results/unit.xml
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

  contract:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Contract tests
          command: |
            if [ -d test/contract ] && [ -n "$(find test/contract -type f -name '*.test.ts' -print -quit)" ]; then
              npm run test:contract
            else
              echo 'No contract tests found; skipping.'
            fi

  eval:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Eval tests
          # Do not use `when: always` or `|| true`: non-zero threshold results must fail this job.
          command: npm run test:eval

  red-team:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Red-team tests
          # Do not use `when: always` or `|| true`: security-threshold failures must fail this job.
          command: npm run test:redteam

  desktop-build:
    parameters:
      platform:
        type: enum
        enum: [linux, macos, windows]
    executor: << parameters.platform >>
    steps:
      - checkout
      - run:
          name: Install desktop build dependencies (<< parameters.platform >>)
          command: npm ci --ignore-scripts
      - run:
          name: Verify deterministic desktop flows (<< parameters.platform >>)
          command: npm run verify:platform-flows
      - run:
          name: Typecheck desktop flows (<< parameters.platform >>)
          command: npm run typecheck
      - run:
          name: Unit desktop flows (<< parameters.platform >>)
          command: npm run test:unit
      - run:
          name: Evaluate desktop flows (<< parameters.platform >>)
          command: npm run test:eval
      - run:
          name: Exercise desktop end-to-end flows (<< parameters.platform >>)
          command: npm run test:e2e
      - run:
          name: Red-team desktop flows (<< parameters.platform >>)
          command: npm run test:redteam
      - when:
          condition:
            equal: [linux, << parameters.platform >>]
          steps:
            - run:
                name: Build and test native library (linux)
                command: |
                  curl -fsSL https://ziglang.org/download/0.14.1/zig-x86_64-linux-0.14.1.tar.xz | tar -xJ -C /tmp
                  export PATH="/tmp/zig-x86_64-linux-0.14.1:$PATH"
                  npm run native:test
                  npm run native:build
                  npx tsx scripts/smoke-native-library.ts --platform linux
                  npx tsx scripts/native-build-evidence.ts --platform linux --library native/zig/zig-out/lib/libcreature_native.so --output native/zig/zig-out/lib/native-evidence-linux.json --smoke-passed true
                  mkdir -p artifacts/linux/native
                  cp native/zig/zig-out/lib/libcreature_native.so native/zig/zig-out/lib/libcreature_native.so.sha256 native/zig/zig-out/lib/native-evidence-linux.json artifacts/linux/native/
      - when:
          condition:
            equal: [macos, << parameters.platform >>]
          steps:
            - run:
                name: Build and test native library (macos)
                command: |
                  curl -fsSL https://ziglang.org/download/0.14.1/zig-aarch64-macos-0.14.1.tar.xz | tar -xJ -C /tmp
                  export PATH="/tmp/zig-aarch64-macos-0.14.1:$PATH"
                  npm run native:test
                  npm run native:build
                  npx tsx scripts/smoke-native-library.ts --platform macos
                  npx tsx scripts/native-build-evidence.ts --platform macos --library native/zig/zig-out/lib/libcreature_native.dylib --output native/zig/zig-out/lib/native-evidence-macos.json --smoke-passed true
                  mkdir -p artifacts/macos/native
                  cp native/zig/zig-out/lib/libcreature_native.dylib native/zig/zig-out/lib/libcreature_native.dylib.sha256 native/zig/zig-out/lib/native-evidence-macos.json artifacts/macos/native/
      - when:
          condition:
            equal: [windows, << parameters.platform >>]
          steps:
            - run:
                name: Build and test native library (windows)
                shell: powershell.exe
                command: |
                  $zigArchivePath = Join-Path $env:TEMP 'zig-x86_64-windows-0.14.1.zip'
                  $zigSha256 = '554f5378228923ffd558eac35e21af020c73789d87afeabf4bfd16f2e6feed2c'
                  Invoke-WebRequest -UseBasicParsing https://ziglang.org/download/0.14.1/zig-x86_64-windows-0.14.1.zip -OutFile $zigArchivePath
                  $actualZigSha256 = (Get-FileHash -Algorithm SHA256 -LiteralPath $zigArchivePath).Hash.ToLowerInvariant()
                  if ($actualZigSha256 -ne $zigSha256) {
                    throw "Zig 0.14.1 Windows x86_64 SHA-256 mismatch: expected $zigSha256, got $actualZigSha256. Refusing to extract or execute the archive."
                  }
                  Expand-Archive -Path $zigArchivePath -DestinationPath $env:TEMP -Force
                  $env:Path = "$env:TEMP\zig-x86_64-windows-0.14.1;$env:Path"
                  npm run native:test
                  npm run native:build
                  npx tsx scripts/smoke-native-library.ts --platform windows
                  npx tsx scripts/native-build-evidence.ts --platform windows --library native/zig/zig-out/bin/creature_native.dll --output native/zig/zig-out/bin/native-evidence-windows.json --smoke-passed true
                  New-Item -ItemType Directory -Force -Path artifacts\windows\native
                  Copy-Item native\zig\zig-out\bin\creature_native.dll,native\zig\zig-out\bin\creature_native.dll.sha256,native\zig\zig-out\bin\native-evidence-windows.json artifacts\windows\native\
      - when:
          condition:
            equal: [windows, << parameters.platform >>]
          steps:
            - run:
                name: Verify Vercel Native Windows directory package and responsive window
                shell: powershell.exe
                no_output_timeout: 20m
                command: |
                   $ErrorActionPreference = 'Stop'
                   $nodeVersion = '22.15.0'
                   $nodeArchive = "node-v$nodeVersion-win-x64.zip"
                   # Pinned from https://nodejs.org/dist/v22.15.0/SHASUMS256.txt.
                   $nodeSha256 = '06067d4f0d463f90ed803d5eca5b039a05dec5d70fc7b7cc254803a59bd0e27c'
                   $zigVersion = '0.16.0'
                   $zigArchive = "zig-x86_64-windows-$zigVersion.zip"
                   # Pinned from https://ziglang.org/download/index.json (0.16.0 x86_64-windows).
                   $zigSha256 = '68659eb5f1e4eb1437a722f1dd889c5a322c9954607f5edcf337bc3684a75a7e'
                   $toolchainRoot = Join-Path $env:TEMP 'creature-vercel-native-toolchains'
                   $nodeArchivePath = Join-Path $toolchainRoot $nodeArchive
                   $zigArchivePath = Join-Path $toolchainRoot $zigArchive
                   $nodeRoot = Join-Path $toolchainRoot "node-v$nodeVersion-win-x64"
                   $zigRoot = Join-Path $toolchainRoot "zig-x86_64-windows-$zigVersion"
                   $packageRoot = 'apps\desktop-native\package\windows'
                   $evidenceSource = 'apps\desktop-native\evidence\windows-package-verify.json'
                   $artifactRoot = 'artifacts\windows\desktop-native'
                   $verificationEvidenceArtifactRoot = 'artifacts\windows\desktop-native-verification-evidence'
                   $commandTimeoutSeconds = 900

                   function Get-Sha256([string]$Path) {
                     return (Get-FileHash -Algorithm SHA256 -LiteralPath $Path).Hash.ToLowerInvariant()
                   }
                   function Install-VerifiedArchive([string]$Uri, [string]$ArchivePath, [string]$ExpectedSha256, [string]$Destination) {
                     Remove-Item -LiteralPath $ArchivePath -Force -ErrorAction SilentlyContinue
                     Remove-Item -LiteralPath $Destination -Recurse -Force -ErrorAction SilentlyContinue
                     Invoke-WebRequest -UseBasicParsing -Uri $Uri -OutFile $ArchivePath
                     if ((Get-Sha256 $ArchivePath) -ne $ExpectedSha256) { throw "SHA-256 verification failed for $Uri." }
                     Expand-Archive -LiteralPath $ArchivePath -DestinationPath $toolchainRoot -Force
                     if (-not (Test-Path -LiteralPath $Destination -PathType Container)) { throw "Verified archive did not contain expected directory $Destination." }
                   }
                   function Invoke-CheckedProcess([string]$FilePath, [string[]]$ArgumentList, [int]$TimeoutSeconds) {
                     $process = Start-Process -FilePath $FilePath -ArgumentList $ArgumentList -NoNewWindow -PassThru
                     if (-not $process.WaitForExit($TimeoutSeconds * 1000)) {
                       & taskkill.exe /PID $process.Id /T /F | Out-Null
                       throw "Timed out after $TimeoutSeconds seconds: $FilePath $($ArgumentList -join ' ')"
                     }
                     $process.Refresh()
                     if ($process.ExitCode -ne 0) { throw "Command failed with exit code $($process.ExitCode): $FilePath $($ArgumentList -join ' ')" }
                   }

                   New-Item -ItemType Directory -Force -Path $toolchainRoot | Out-Null
                   Install-VerifiedArchive "https://nodejs.org/dist/v$nodeVersion/$nodeArchive" $nodeArchivePath $nodeSha256 $nodeRoot
                   Install-VerifiedArchive "https://ziglang.org/download/$zigVersion/$zigArchive" $zigArchivePath $zigSha256 $zigRoot
                   $env:Path = "$nodeRoot;$zigRoot;$env:Path"
                   if ((& "$nodeRoot\node.exe" --version) -ne "v$nodeVersion") { throw 'Pinned Node runtime version check failed.' }
                   if ((& "$zigRoot\zig.exe" version) -ne $zigVersion) { throw 'Pinned Zig runtime version check failed.' }

                   # This scoped PATH deliberately follows the Zig 0.14.1 native-library validation above.
                   Invoke-CheckedProcess "$nodeRoot\npm.cmd" @('run', 'desktop:check') $commandTimeoutSeconds
                   try {
                     Invoke-CheckedProcess "$nodeRoot\npm.cmd" @('run', 'desktop:verify-package:windows') $commandTimeoutSeconds

                     if (-not (Test-Path -LiteralPath $packageRoot -PathType Container)) { throw 'Vercel Native did not produce the expected fresh Windows directory package.' }
                     if (-not (Test-Path -LiteralPath $evidenceSource -PathType Leaf)) { throw 'Vercel Native readiness evidence is missing.' }
                     $evidence = Get-Content -LiteralPath $evidenceSource -Raw | ConvertFrom-Json
                     if ($evidence.result -ne 'passed' -or -not $evidence.readiness.ready -or -not $evidence.readiness.responsive -or $evidence.readiness.title -ne 'Creature OS - Go Agent' -or -not $evidence.cleanup.completed) {
                       throw 'Vercel Native package evidence did not prove responsive exact-title window readiness and cleanup.'
                     }

                     Remove-Item -LiteralPath $artifactRoot -Recurse -Force -ErrorAction SilentlyContinue
                     New-Item -ItemType Directory -Force -Path "$artifactRoot\package", "$artifactRoot\evidence" | Out-Null
                     Copy-Item -LiteralPath $packageRoot -Destination "$artifactRoot\package" -Recurse -Force
                     Copy-Item -LiteralPath $evidenceSource -Destination "$artifactRoot\evidence\windows-package-verify.json" -Force
                     $manifest = Get-ChildItem -LiteralPath $artifactRoot -Recurse -File | Where-Object { $_.Name -ne 'SHA256SUMS.txt' } | Sort-Object FullName | ForEach-Object {
                       "$(Get-Sha256 $_.FullName)  $($_.FullName.Substring((Resolve-Path -LiteralPath $artifactRoot).Path.Length + 1).Replace('\', '/'))"
                     }
                     if (-not $manifest) { throw 'No Vercel Native package or evidence files were retained.' }
                     [System.IO.File]::WriteAllLines((Join-Path $artifactRoot 'SHA256SUMS.txt'), [string[]]$manifest, (New-Object System.Text.UTF8Encoding($false)))
                   }
                   finally {
                     if (Test-Path -LiteralPath $evidenceSource -PathType Leaf) {
                       New-Item -ItemType Directory -Force -Path $verificationEvidenceArtifactRoot | Out-Null
                       Copy-Item -LiteralPath $evidenceSource -Destination "$verificationEvidenceArtifactRoot\windows-package-verify.json" -Force
                     }
                   }
      - when:
          condition:
            equal: [windows, << parameters.platform >>]
          steps:
            - store_artifacts:
                path: artifacts/windows/desktop-native-verification-evidence
                destination: windows-package-verification-evidence
      - when:
          condition:
            not:
              equal: [windows, << parameters.platform >>]
          steps:
            - run:
                name: Record blocked launch and keyring evidence (<< parameters.platform >>)
                command: |
                  mkdir -p artifacts/<< parameters.platform >>
                  printf '%s\n' 'STATUS: BLOCKED/NOT IMPLEMENTED' 'No installer framework or runnable desktop executable is implemented.' 'Production OS keyring write/read/delete adapter is not implemented.' 'Signing and notarization are not implemented.' > artifacts/<< parameters.platform >>/launch-keyring-evidence.txt
      - when:
          condition:
            equal: [windows, << parameters.platform >>]
          steps:
            - run:
                name: Record blocked launch and keyring evidence (windows)
                shell: powershell.exe
                command: |
                  New-Item -ItemType Directory -Force -Path artifacts\windows
                  @('STATUS: BLOCKED/NOT IMPLEMENTED','No installer framework or runnable desktop executable is implemented.','Production OS keyring write/read/delete adapter is not implemented.','Signing and notarization are not implemented.') | Set-Content artifacts\windows\launch-keyring-evidence.txt
      - persist_to_workspace:
          root: ~/project
          paths:
            - artifacts

  publish-desktop-artifacts:
    executor: node
    steps:
      - attach_workspace:
          at: ~/project
      # CircleCI retains these artifacts for release review. Add signing/notarization and
      # upload-to-release-registry steps here once native packages replace the placeholders.
      - store_artifacts:
          path: artifacts
          destination: desktop

workflows:
  verify:
    jobs:
      - install
      - typecheck:
          requires: [install]
      - lint:
          requires: [typecheck]
      - unit:
          requires: [lint]
      - contract:
          requires: [unit]
      - eval:
          requires: [contract]
      - red-team:
          requires: [eval]
      - desktop-build:
          requires: [red-team]
          matrix:
            parameters:
              platform: [linux, macos, windows]
      - publish-desktop-artifacts:
          requires: [desktop-build]
