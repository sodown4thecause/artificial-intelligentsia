version: 2.1

# This pipeline deliberately never echoes environment variables or secret values.
# Store credentials in CircleCI contexts/project environment variables only.

executors:
  node:
    docker:
      - image: cimg/node:22.14
    working_directory: ~/project

commands:
  attach_dependencies:
    steps:
      - attach_workspace:
          at: ~/project

jobs:
  install:
    executor: node
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci --ignore-scripts
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - persist_to_workspace:
          root: ~/project
          paths:
            - node_modules
            - package.json
            - package-lock.json
            - tsconfig.json
            - src
            - test
            - scripts

  typecheck:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Typecheck
          command: npm run typecheck

  lint:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Lint placeholder
          command: npm run lint

  unit:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Unit tests
          command: npm run test:unit

  contract:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Contract tests
          command: |
            if [ -d test/contract ] && [ -n "$(find test/contract -type f -name '*.test.ts' -print -quit)" ]; then
              npm run test:contract
            else
              echo 'No contract tests found; skipping.'
            fi

  eval:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Eval tests
          # Do not use `when: always` or `|| true`: non-zero threshold results must fail this job.
          command: npm run test:eval

  red-team:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Red-team tests
          # Do not use `when: always` or `|| true`: security-threshold failures must fail this job.
          command: npm run test:redteam

  desktop-build:
    executor: node
    parameters:
      platform:
        type: enum
        enum: [linux, macos, windows]
    steps:
      - attach_dependencies
      # These matrix entries are intentional placeholders. Configure native macOS and Windows
      # executors here when desktop packaging is introduced; do not treat Linux as cross-platform.
      - run:
          name: Desktop build placeholder (<< parameters.platform >>)
          command: echo 'Desktop build runner for << parameters.platform >> is not configured yet.'

workflows:
  verify:
    jobs:
      - install
      - typecheck:
          requires: [install]
      - lint:
          requires: [typecheck]
      - unit:
          requires: [lint]
      - contract:
          requires: [unit]
      - eval:
          requires: [contract]
      - red-team:
          requires: [eval]
      - desktop-build:
          requires: [red-team]
          matrix:
            parameters:
              platform: [linux, macos, windows]
