version: 2.1

# This pipeline deliberately never echoes environment variables or secret values.
# Store credentials in CircleCI contexts/project environment variables only.

executors:
  node:
    docker:
      - image: cimg/node:22.14
    working_directory: ~/project
  linux:
    docker:
      - image: cimg/node:22.14
    working_directory: ~/project
  macos:
    macos:
      xcode: "15.2.0"
    resource_class: macos.m1.medium.gen1
    working_directory: ~/project
  windows:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    working_directory: ~/project

commands:
  attach_dependencies:
    steps:
      - attach_workspace:
          at: ~/project

jobs:
  install:
    executor: node
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-
      - run:
          name: Install dependencies
          command: npm ci --ignore-scripts
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - persist_to_workspace:
          root: ~/project
          paths:
            - node_modules
            - package.json
            - package-lock.json
            - tsconfig.json
            - src
            - test
            - scripts

  typecheck:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Typecheck
          command: npm run typecheck

  lint:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Lint placeholder
          command: npm run lint

  unit:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Unit tests
          command: |
            mkdir -p test-results
            npm run test:unit -- --reporter=junit --outputFile=test-results/unit.xml
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

  contract:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Contract tests
          command: |
            if [ -d test/contract ] && [ -n "$(find test/contract -type f -name '*.test.ts' -print -quit)" ]; then
              npm run test:contract
            else
              echo 'No contract tests found; skipping.'
            fi

  eval:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Eval tests
          # Do not use `when: always` or `|| true`: non-zero threshold results must fail this job.
          command: npm run test:eval

  red-team:
    executor: node
    steps:
      - attach_dependencies
      - run:
          name: Red-team tests
          # Do not use `when: always` or `|| true`: security-threshold failures must fail this job.
          command: npm run test:redteam

  desktop-build:
    parameters:
      platform:
        type: enum
        enum: [linux, macos, windows]
    executor: << parameters.platform >>
    steps:
      - checkout
      - run:
          name: Install desktop build dependencies (<< parameters.platform >>)
          command: npm ci --ignore-scripts
      - run:
          name: Verify deterministic desktop flows (<< parameters.platform >>)
          command: npm run verify:platform-flows
      - run:
          name: Typecheck desktop flows (<< parameters.platform >>)
          command: npm run typecheck
      - run:
          name: Unit desktop flows (<< parameters.platform >>)
          command: npm run test:unit
      - run:
          name: Evaluate desktop flows (<< parameters.platform >>)
          command: npm run test:eval
      - run:
          name: Exercise desktop end-to-end flows (<< parameters.platform >>)
          command: npm run test:e2e
      - run:
          name: Red-team desktop flows (<< parameters.platform >>)
          command: npm run test:redteam
      # Native packaging intentionally remains a placeholder until the desktop shell is selected.
      # Replace this command with the signed Electron/Tauri package command for each runner;
      # keep artifacts under artifacts/<< parameters.platform >> for the publishing job below.
      - run:
          name: Package desktop placeholder (<< parameters.platform >>)
          command: node -e "require('fs').mkdirSync('artifacts/<< parameters.platform >>', { recursive: true }); require('fs').writeFileSync('artifacts/<< parameters.platform >>/README.txt', 'Native << parameters.platform >> packaging is not configured yet.\\n')"
      - persist_to_workspace:
          root: ~/project
          paths:
            - artifacts

  publish-desktop-artifacts:
    executor: node
    steps:
      - attach_workspace:
          at: ~/project
      # CircleCI retains these artifacts for release review. Add signing/notarization and
      # upload-to-release-registry steps here once native packages replace the placeholders.
      - store_artifacts:
          path: artifacts
          destination: desktop

workflows:
  verify:
    jobs:
      - install
      - typecheck:
          requires: [install]
      - lint:
          requires: [typecheck]
      - unit:
          requires: [lint]
      - contract:
          requires: [unit]
      - eval:
          requires: [contract]
      - red-team:
          requires: [eval]
      - desktop-build:
          requires: [red-team]
          matrix:
            parameters:
              platform: [linux, macos, windows]
      - publish-desktop-artifacts:
          requires: [desktop-build]
