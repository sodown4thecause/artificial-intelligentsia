name: Native library evidence

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  native-library:
    name: Native library (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            library: libcreature_native.so
          - os: macos-latest
            platform: macos
            library: libcreature_native.dylib
          - os: windows-latest
            platform: windows
            library: creature_native.dll

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install JavaScript dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Test native library
        run: npm run native:test

      - name: Build native library
        run: npm run native:build

      - name: Smoke native library
        run: npx --no-install tsx scripts/smoke-native-library.ts --platform ${{ matrix.platform }}

      - name: Generate native evidence
        run: npx --no-install tsx scripts/native-build-evidence.ts --platform ${{ matrix.platform }} --library native/zig/zig-out/lib/${{ matrix.library }} --output native/zig/zig-out/lib/native-evidence-${{ matrix.platform }}.json --smoke-passed true

      - name: Upload native library evidence
        uses: actions/upload-artifact@v4
        with:
          name: native-library-evidence-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            native/zig/zig-out/lib/${{ matrix.library }}
            native/zig/zig-out/lib/${{ matrix.library }}.sha256
            native/zig/zig-out/lib/native-evidence-${{ matrix.platform }}.json
